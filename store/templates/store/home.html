{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Shirin's Boutique</title>

    <!-- FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lora&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Lora', serif;
            background-color: #f8f5f2;
        }

        /* NAVBAR */
        .navbar {
            background-color: #8B2E2E;
            color: #f5e6d3;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            margin: 0;
            font-family: 'Playfair Display', serif;
        }

        .nav-links a {
            color: #f5e6d3;
            margin-left: 20px;
            text-decoration: none;
            font-size: 14px;
        }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
                        url("{% static 'images/hero.jpg' %}");
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: #8B2E2E;

            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .content {
            color: #f5e6d3;
        }

        .content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 70px;
            margin: 0;
        }

        .content p {
            font-size: 20px;
            margin-top: 10px;
            font-style: italic;
        }

        /* LOGO */
        .logo {
            position: absolute;
            top: 15px;
            left: 20px;
            height: 70px;
        }

        /* PRODUCTS SECTION */
        .products {
            padding: 60px 40px;
        }

        .products h2 {
            text-align: center;
            font-family: 'Playfair Display', serif;
            margin-bottom: 40px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .card h3 {
            margin: 10px 0;
        }

        .card p {
            color: #8B2E2E;
            font-weight: bold;
        }

        .card button {
            background: #8B2E2E;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            margin-top: 10px;
        }

    </style>
</head>

<body>

    <!-- LOGO -->
    <img src="{% static 'images/logo.png' %}" class="logo">

    <!-- NAVBAR -->
    <div class="navbar">
        <h2>Shirin's Boutique</h2>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Cart</a>
            <a href="#">Wishlist</a>
            <a href="#">Account</a>
        </div>
    </div>

    <!-- HERO -->
    <div class="hero">
        <div class="content">
            <h1>Shirin's Boutique</h1>
            <p>Where elegance meets tradition</p>
        </div>
    </div>

    <!-- PRODUCTS -->
    <div class="products">
        <h2>Our Collection</h2>

        <div class="product-grid">
            {% for product in products %}
                <div class="card">
                    <img src="{{ product.image.url }}">
                    <h3>{{ product.name }}</h3>
                    <p>₹{{ product.price }}</p>
                    <button>Add to Cart</button>
                </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
